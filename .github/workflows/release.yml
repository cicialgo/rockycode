name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-13  # x86_64 Mac — the only platform missing cbor2 wheels
    strategy:
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}

      - name: Install Rust (cbor2 needs it on macOS x86_64)
        run: rustup update stable

      - name: Build rockycode wheel (only once)
        if: matrix.python == '3.11'
        run: uv build

      - name: Build cbor2 wheel
        run: uv pip wheel cbor2==6.1.2 --no-deps -w dist/

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.python }}
          path: dist/

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: wheels-*
          merge-multiple: true

      - name: Show artifacts
        run: ls -la dist/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
